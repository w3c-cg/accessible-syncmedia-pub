title: Accessible Synchronized Multimedia for Publishing Community Group
description: W3C Community Group meeting notes and resources.
url: "https://w3c-cg.github.io"
baseurl: "/accessible-syncmedia-pub"

markdown: kramdown

plugins:
  - jekyll-default-layout
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-relative-links
  - jekyll-titles-from-headings

defaults:
  - scope:
      path: ""
    values:
      layout: default

optional_front_matter:
  remove_originals: true

readme_index:
  enabled: true
  remove_originals: true
  with_frontmatter: true

relative_links:
  enabled: true
  collections: false

titles_from_headings:
  enabled: true
  strip_title: false
  collections: false

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
