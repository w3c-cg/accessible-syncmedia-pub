name: Build and deploy site

on:
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "_config.yml"
      - "_layouts/**"
      - "assets/**"
      - "Gemfile"
      - "minutes/**"
      - "w3c.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate minutes README
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# Meeting Minutes"
            echo
            echo "<!-- This list is generated by .github/workflows/pages.yml. -->"
            echo

            shopt -s nullglob
            files=(minutes/????-??-??.md)

            if ((${#files[@]} == 0)); then
              echo "_No meeting minutes have been posted yet._"
            else
              printf "%s\n" "${files[@]}" | sort -r | while IFS= read -r file; do
                date="${file#minutes/}"
                date="${date%.md}"
                printf "* [%s](%s.md)\n" "$date" "$date"
              done
            fi
          } > minutes/README.md

      - name: Commit minutes README update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- minutes/README.md; then
            echo "minutes/README.md is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add minutes/README.md
          git commit -m "Update minutes README"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
